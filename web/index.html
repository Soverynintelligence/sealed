<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sealed — proof of what you agreed</title>
<style>
  :root{
    --ink:#12203a;        /* deep archival navy */
    --ink-2:#22355c;
    --paper:#f6f1e7;      /* warm document cream */
    --paper-2:#efe7d6;
    --brass:#b7822a;      /* notary brass accent */
    --brass-2:#d8a441;
    --line:#d9cdb5;
    --good:#1f7a4d;
    --bad:#a3341f;
    --muted:#6b6153;
    --shadow:0 10px 40px -12px rgba(18,32,58,.35);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --ink:#e8ecf5; --ink-2:#b8c2d6; --paper:#0e1526; --paper-2:#141d33;
      --line:#26324c; --brass:#d8a441; --brass-2:#eab94f; --muted:#8b93a6;
      --shadow:0 10px 40px -12px rgba(0,0,0,.6);
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
    background:
      radial-gradient(120% 90% at 50% -10%, var(--paper-2), var(--paper)) fixed;
    color:var(--ink);
    min-height:100dvh;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  .mono{font-family:"SFMono-Regular",ui-monospace,"Menlo","Consolas",monospace}
  .wrap{max-width:560px;margin:0 auto;padding:20px 20px 56px;min-height:100dvh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-.02em;font-size:20px}
  .seal-mark{
    width:30px;height:30px;border-radius:50%;flex:none;
    background:radial-gradient(circle at 35% 30%,var(--brass-2),var(--brass));
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.25), inset 0 -3px 6px rgba(0,0,0,.25);
    display:grid;place-items:center;color:#fff;font-size:14px;
  }
  .net{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);
    border:1px solid var(--line);border-radius:999px;padding:5px 10px;white-space:nowrap}
  .net b{color:var(--brass)}
  h1{font-size:26px;line-height:1.15;letter-spacing:-.02em;margin:.2em 0 .3em;text-wrap:balance}
  .sub{color:var(--muted);margin:0 0 20px;font-size:15px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--shadow);
    background-image:linear-gradient(0deg,transparent 0,transparent),
      repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(120,100,60,.05) 28px)}
  @media (prefers-color-scheme: dark){ .card{background:var(--paper-2);background-image:none} }
  label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:14px 0 6px;font-weight:600}
  input,textarea{width:100%;font:inherit;color:var(--ink);background:transparent;
    border:1px solid var(--line);border-radius:10px;padding:11px 12px;outline:none}
  input:focus,textarea:focus{border-color:var(--brass);box-shadow:0 0 0 3px rgba(183,130,42,.15)}
  textarea{resize:vertical;min-height:64px}
  .amt{position:relative}
  .amt input{padding-left:26px;font-size:20px;font-weight:700}
  .amt::before{content:"$";position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:18px;font-weight:700}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
    font:inherit;font-weight:700;cursor:pointer;border:none;border-radius:12px;padding:14px 16px;margin-top:18px;
    background:var(--ink);color:var(--paper);transition:transform .05s ease, opacity .2s}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.brass{background:linear-gradient(180deg,var(--brass-2),var(--brass));color:#fff}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row>*{flex:1}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px dashed var(--line);font-size:14px}
  .kv:last-child{border-bottom:none}
  .kv .k{color:var(--muted)}
  .kv .v{text-align:right;word-break:break-word}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px}
  .pill.sealed{background:rgba(183,130,42,.15);color:var(--brass)}
  .pill.accepted{background:rgba(31,122,77,.15);color:var(--good)}
  .pill.tamper{background:rgba(163,52,31,.15);color:var(--bad)}
  .note{font-size:13px;color:var(--muted);margin-top:14px}
  .hash{font-size:12px;color:var(--muted);word-break:break-all}
  a{color:var(--brass);text-decoration:none;font-weight:600}
  a:hover{text-decoration:underline}
  .hidden{display:none!important}
  .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:var(--ink);color:var(--paper);
    padding:12px 18px;border-radius:12px;font-size:14px;box-shadow:var(--shadow);opacity:0;transition:opacity .2s;pointer-events:none;max-width:90vw;text-align:center}
  .toast.show{opacity:1}
  .spacer{flex:1}
  footer{margin-top:26px;font-size:12px;color:var(--muted);text-align:center}
  .tabs{display:flex;gap:6px;background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:16px}
  .tabs button{flex:1;font:inherit;font-weight:700;font-size:14px;border:none;background:transparent;color:var(--muted);padding:9px;border-radius:9px;cursor:pointer}
  .tabs button.on{background:var(--paper);color:var(--ink);box-shadow:var(--shadow)}
  @media (prefers-color-scheme: dark){ .tabs button.on{background:var(--ink-2);color:#fff} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><span class="seal-mark">✦</span> Sealed</div>
    <span class="net">Monad <b>Testnet</b></span>
  </header>

  <!-- SEAL (contractor) + ACCEPT (customer) share this shell; JS shows the right one -->
  <main id="app">
    <div id="loading" class="sub">Loading…</div>
  </main>

  <div class="spacer"></div>
  <footer>Only a <em>hash</em> of your quote goes onchain — the details stay private, the agreement stays provable.</footer>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { BrowserProvider, Contract, keccak256, toUtf8Bytes } from "https://esm.sh/ethers@6.13.4";

// ---- config ----------------------------------------------------------------
// Set after deploy (Task: paste the Monad-testnet contract address here).
const CONTRACT_ADDRESS = "0x0000000000000000000000000000000000000000";
const MONAD = {
  chainIdHex: "0x279f",           // 10143
  chainId: 10143,
  params: {
    chainId: "0x279f",
    chainName: "Monad Testnet",
    nativeCurrency: { name: "Monad", symbol: "MON", decimals: 18 },
    rpcUrls: ["https://testnet-rpc.monad.xyz"],
    blockExplorerUrls: ["https://testnet.monadexplorer.com"],
  },
};
const EXPLORER = "https://testnet.monadexplorer.com";
const ABI = [
  "function sealQuote(bytes32 quoteHash, uint256 amountCents) external",
  "function acceptQuote(bytes32 quoteHash) external",
  "function getQuote(bytes32 quoteHash) view returns (address contractor, address customer, uint256 amountCents, uint64 sealedAt, uint64 acceptedAt, bool accepted, bool exists)",
];

// ---- tiny helpers ----------------------------------------------------------
const $ = (s, r = document) => r.querySelector(s);
const app = $("#app");
const toastEl = $("#toast");
let toastT;
function toast(msg){ toastEl.textContent = msg; toastEl.classList.add("show"); clearTimeout(toastT); toastT = setTimeout(()=>toastEl.classList.remove("show"), 3200); }
const money = (cents) => "$" + (Number(cents)/100).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const short = (a) => a ? a.slice(0,6) + "…" + a.slice(-4) : "";
const when = (secs) => Number(secs) ? new Date(Number(secs)*1000).toLocaleString() : "—";
const b64url = {
  enc: (obj) => btoa(unescape(encodeURIComponent(JSON.stringify(obj)))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""),
  dec: (s) => JSON.parse(decodeURIComponent(escape(atob(s.replace(/-/g,"+").replace(/_/g,"/"))))),
};
// Canonical string a quote hashes to — fixed field order so the same quote
// always yields the same hash, on both the seal and accept sides.
const canonical = (p) => `sealed.v1|${p.customer}|${p.scope}|${p.amountCents}|${p.salt}`;
const hashOf = (p) => keccak256(toUtf8Bytes(canonical(p)));

const hasWallet = () => typeof window.ethereum !== "undefined";
async function getSignerContract(){
  if (!hasWallet()) throw new Error("No wallet found. Install MetaMask to continue.");
  const provider = new BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  // Ensure we're on Monad testnet; offer to add/switch if not.
  const net = await provider.getNetwork();
  if (Number(net.chainId) !== MONAD.chainId){
    try { await window.ethereum.request({ method:"wallet_switchEthereumChain", params:[{ chainId: MONAD.chainIdHex }] }); }
    catch(e){ if (e.code === 4902) await window.ethereum.request({ method:"wallet_addEthereumChain", params:[MONAD.params] }); else throw e; }
  }
  const signer = await new BrowserProvider(window.ethereum).getSigner();
  return { signer, contract: new Contract(CONTRACT_ADDRESS, ABI, signer), address: await signer.getAddress() };
}

const configured = () => /^0x[0-9a-fA-F]{40}$/.test(CONTRACT_ADDRESS) && CONTRACT_ADDRESS !== "0x0000000000000000000000000000000000000000";

// ---- SEAL view (contractor) ------------------------------------------------
function renderSeal(){
  app.innerHTML = `
    <div class="tabs">
      <button class="on" id="tab-seal">Seal a quote</button>
      <button id="tab-check">Check a quote</button>
    </div>
    <h1>Seal what you agreed.</h1>
    <p class="sub">Lock a quote onchain, then send your customer a link to accept it. Neither side can rewrite the number or the date after.</p>
    <div class="card">
      <label for="f-cust">Customer</label>
      <input id="f-cust" placeholder="Pat Rowley" autocomplete="off">
      <label for="f-scope">Scope</label>
      <textarea id="f-scope" placeholder="Pond rebuild — 24×18×3, all-boulder, full equipment"></textarea>
      <label for="f-amt">Total</label>
      <div class="amt"><input id="f-amt" inputmode="decimal" placeholder="26,564.00"></div>
      <button class="btn brass" id="do-seal">Seal quote onchain</button>
      <p class="note" id="seal-note">You'll approve one transaction in your wallet. Testnet MON only — no real money.</p>
    </div>`;
  $("#tab-check").onclick = () => location.search = "";  // check flow lives at ?q=
  $("#do-seal").onclick = onSeal;
  // "Check a quote" — simple prompt-free switch: reveal a hash box
  $("#tab-check").onclick = renderCheckPrompt;
}

function renderCheckPrompt(){
  app.innerHTML = `
    <div class="tabs">
      <button id="tab-seal">Seal a quote</button>
      <button class="on" id="tab-check">Check a quote</button>
    </div>
    <h1>Check a quote.</h1>
    <p class="sub">Paste a Sealed link (or open one) to see its onchain status — who sealed it, for how much, and whether it's been accepted.</p>
    <div class="card">
      <label for="f-link">Sealed link</label>
      <input id="f-link" placeholder="https://…?d=…" autocomplete="off">
      <button class="btn" id="do-open">Open</button>
    </div>`;
  $("#tab-seal").onclick = renderSeal;
  $("#do-open").onclick = () => {
    const v = $("#f-link").value.trim();
    try { const u = new URL(v); location.search = u.search; }
    catch { toast("That doesn't look like a valid link."); }
  };
}

async function onSeal(){
  const customer = $("#f-cust").value.trim();
  const scope = $("#f-scope").value.trim();
  const amountCents = Math.round(parseFloat($("#f-amt").value.replace(/[^0-9.]/g,"")) * 100);
  if (!customer || !scope || !(amountCents > 0)){ toast("Fill in customer, scope, and a total."); return; }
  if (!configured()){ toast("Contract address isn't set yet — deploy first."); return; }
  const salt = Date.now().toString(36) + Math.random().toString(36).slice(2,8);
  const payload = { customer, scope, amountCents, salt };
  const quoteHash = hashOf(payload);
  const btn = $("#do-seal"); btn.disabled = true; btn.textContent = "Confirm in your wallet…";
  try {
    const { contract } = await getSignerContract();
    const tx = await contract.sealQuote(quoteHash, amountCents);
    btn.textContent = "Sealing onchain…";
    await tx.wait();
    const link = location.origin + location.pathname + "?d=" + b64url.enc(payload);
    renderSealed(payload, quoteHash, link, tx.hash);
  } catch(e){
    btn.disabled = false; btn.textContent = "Seal quote onchain";
    toast(cleanErr(e));
  }
}

function renderSealed(payload, quoteHash, link, txHash){
  app.innerHTML = `
    <h1>Sealed. <span class="pill sealed">✦ onchain</span></h1>
    <p class="sub">This quote is now locked onchain. Send your customer the link — they accept from their own wallet.</p>
    <div class="card">
      <div class="kv"><span class="k">Customer</span><span class="v">${esc(payload.customer)}</span></div>
      <div class="kv"><span class="k">Scope</span><span class="v">${esc(payload.scope)}</span></div>
      <div class="kv"><span class="k">Total</span><span class="v"><b>${money(payload.amountCents)}</b></span></div>
      <div class="kv"><span class="k">Quote hash</span><span class="v hash mono">${quoteHash}</span></div>
      <button class="btn brass" id="copy">Copy customer link</button>
      <button class="btn ghost" id="view-tx">View transaction ↗</button>
    </div>
    <p class="note">Anyone with the link can verify it — but only a <b>different</b> wallet can accept it, which is what makes acceptance real.</p>`;
  $("#copy").onclick = async () => { await navigator.clipboard.writeText(link); toast("Link copied — send it to your customer."); };
  $("#view-tx").onclick = () => window.open(`${EXPLORER}/tx/${txHash}`, "_blank");
}

// ---- ACCEPT / VERIFY view (customer) --------------------------------------
async function renderAccept(payload){
  const quoteHash = hashOf(payload);
  app.innerHTML = `<div class="sub">Reading this quote from the chain…</div>`;
  let oc;
  try { oc = await viewQuote(quoteHash); }
  catch(e){ app.innerHTML = `<h1>Couldn't reach the chain.</h1><p class="sub">${esc(cleanErr(e))}</p>`; return; }

  if (!oc.exists){
    app.innerHTML = `<h1>Not found onchain.</h1><p class="sub">This link doesn't match any sealed quote. It may have been altered.</p>`;
    return;
  }
  // Cross-check: the amount in the link must match what was sealed onchain.
  const tampered = BigInt(payload.amountCents) !== oc.amountCents;
  const statusPill = oc.accepted
    ? `<span class="pill accepted">✓ accepted</span>`
    : tampered ? `<span class="pill tamper">⚠ link altered</span>`
    : `<span class="pill sealed">✦ sealed, awaiting you</span>`;

  app.innerHTML = `
    <h1>Your quote ${statusPill}</h1>
    <p class="sub">${oc.accepted ? "This agreement is sealed and accepted onchain." : tampered ? "The amount in this link does not match what was sealed onchain — do not accept." : "Review it, then accept from your wallet to lock the agreement."}</p>
    <div class="card">
      <div class="kv"><span class="k">Customer</span><span class="v">${esc(payload.customer)}</span></div>
      <div class="kv"><span class="k">Scope</span><span class="v">${esc(payload.scope)}</span></div>
      <div class="kv"><span class="k">Total (in link)</span><span class="v"><b>${money(payload.amountCents)}</b></span></div>
      <div class="kv"><span class="k">Total (onchain)</span><span class="v ${tampered?'':''}"><b>${money(oc.amountCents)}</b></span></div>
      <div class="kv"><span class="k">Sealed by</span><span class="v mono">${short(oc.contractor)}</span></div>
      <div class="kv"><span class="k">Sealed at</span><span class="v">${when(oc.sealedAt)}</span></div>
      ${oc.accepted ? `
      <div class="kv"><span class="k">Accepted by</span><span class="v mono">${short(oc.customer)}</span></div>
      <div class="kv"><span class="k">Accepted at</span><span class="v">${when(oc.acceptedAt)}</span></div>` : ``}
      <div class="kv"><span class="k">Quote hash</span><span class="v hash mono">${quoteHash}</span></div>
      ${oc.accepted
        ? `<button class="btn ghost" id="view">View onchain ↗</button>`
        : tampered
          ? `<button class="btn" disabled>Amount mismatch — can't accept</button>`
          : `<button class="btn brass" id="do-accept">Accept this quote</button>`}
    </div>
    <p class="note">Sealed with <b>Sealed</b> · verified against Monad testnet.</p>`;

  if (oc.accepted) $("#view").onclick = () => window.open(`${EXPLORER}/address/${CONTRACT_ADDRESS}`, "_blank");
  else if (!tampered) $("#do-accept").onclick = () => onAccept(quoteHash, payload);
}

async function onAccept(quoteHash, payload){
  const btn = $("#do-accept"); btn.disabled = true; btn.textContent = "Confirm in your wallet…";
  try {
    const { contract } = await getSignerContract();
    const tx = await contract.acceptQuote(quoteHash);
    btn.textContent = "Recording onchain…";
    await tx.wait();
    toast("Accepted — it's sealed onchain.");
    renderAccept(payload); // re-read: now shows accepted state from chain
  } catch(e){
    btn.disabled = false; btn.textContent = "Accept this quote";
    toast(cleanErr(e));
  }
}

// Read a quote from chain. Prefers the public RPC (no wallet needed to view);
// falls back to the injected provider if present.
async function viewQuote(quoteHash){
  const { JsonRpcProvider } = await import("https://esm.sh/ethers@6.13.4");
  const provider = new JsonRpcProvider(MONAD.params.rpcUrls[0], MONAD.chainId);
  const c = new Contract(CONTRACT_ADDRESS, ABI, provider);
  const r = await c.getQuote(quoteHash);
  return { contractor:r[0], customer:r[1], amountCents:r[2], sealedAt:r[3], acceptedAt:r[4], accepted:r[5], exists:r[6] };
}

// ---- misc ------------------------------------------------------------------
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
function cleanErr(e){
  const m = (e && (e.shortMessage || e.reason || e.message)) || String(e);
  if (/user rejected/i.test(m)) return "You cancelled the transaction.";
  if (/already accepted/i.test(m)) return "This quote was already accepted.";
  if (/self-accept/i.test(m)) return "You sealed this quote — it must be accepted from a different wallet.";
  if (/already sealed/i.test(m)) return "An identical quote was already sealed.";
  return m.length > 120 ? m.slice(0,120)+"…" : m;
}

// ---- route -----------------------------------------------------------------
(function main(){
  if (!configured()){
    // Still let the contractor see the UI; seal is gated with a toast until deployed.
  }
  const params = new URLSearchParams(location.search);
  const d = params.get("d");
  if (d){
    try { renderAccept(b64url.dec(d)); }
    catch { app.innerHTML = `<h1>Broken link.</h1><p class="sub">This Sealed link couldn't be read.</p>`; }
  } else {
    renderSeal();
  }
})();
</script>
</body>
</html>
